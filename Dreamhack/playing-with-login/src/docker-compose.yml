version: "3.9"

services:
  app:
    container_name: app
    build:
      context: ./deploy/app
    networks:
      - internal
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mariadb:11.3.2-jammy
    environment:
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=1
    volumes:
      - ./deploy/db:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

networks:
  internal:
