{% extends "base.html" %}
{% block title %}Request Password Change{% endblock %}

{% block content %}
  <h2>Request Password Change</h2>
  <p class="mt-2">
    Enter your username. We will send a one-time password change link to your private My Page inbox.
  </p>

  <form method="POST" class="form mt-3">
    <div class="form__row">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" value="{{ request.form.username or '' }}" required>
    </div>

    <button type="submit" class="btn btn--primary mt-3">
      Send Link to My Page
    </button>
  </form>
{% endblock %}
