<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/login.css">

    <title>Login Page</title>
</head>

<body>
    <div class="container">
        <h2 class="text-center mt-5">Welcome to Vakery</h2>
        <div class="row justify-content-center">
            <div class="col-4">
                <form class="mt-5" action="/login" method="post">
                    <div class="form-group">
                        <label for="username">ID</label>
                        <input type="text" class="form-control" id="username" name="username" aria-describedby="idHelp">
                    </div>
                    <div class="form-group">
                        <label for="password">PW</label>
                        <input type="password" class="form-control" id="password" name="password">
                    </div>
                    <div class="mt-3">
                        {{ msg }}
                    </div>
                    <button type="submit" class="btn btn-brown" id="submit">Login</button>
                </form>
                <div class="mt-3">
                    <a href="/signup" class="btn btn-brown">Signup</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>

</html>
